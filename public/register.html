<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Register</title>
        <style>
            body {
                background: linear-gradient(135deg, #f8f9fa, #e9ecef);
                min-height: 100vh;
            }
            .auth-card {
                border: none;
                border-radius: 1rem;
                box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08);
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card auth-card">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold mb-2">Create Account</h2>
                                <p class="text-muted mb-0">Register with your university email</p>
                            </div>

                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email address</label>
                                    <input type="email" id="email" class="form-control form-control-lg" placeholder="name@westminster.ac.uk" required />
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter password" required />
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg">Register</button>
                                </div>
                            </form>

                            <div id="alertBox"></div>

                            <div id="verifySection" class="mt-3 d-none">
                                <div class="alert alert-info">
                                    <strong>Registration successful.</strong><br>
                                    Click below to verify your email.
                                    <div class="mt-2">
                                        <a id="verifyLink" href="#" class="btn btn-outline-primary btn-sm">Verify Email</a>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-3">
                                <a href="/login.html" class="text-decoration-none">Already have an account? Login</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const form = document.getElementById("registerForm");
            const alertBox = document.getElementById("alertBox");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({email, password})
                });

                const data = await res.json();

                alertBox.innerHTML = `
              <div class="alert ${res.ok ? "alert-success" : "alert-danger"}">
                ${data.message || "Something went wrong"}
              </div>
            `;

                if (data.verificationLink) {
                    document.getElementById("verifySection").classList.remove("d-none");
                    document.getElementById("verifyLink").href = data.verificationLink;
                } else {
                    document.getElementById("verifySection").classList.add("d-none");
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
