<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Forgot Password</title>
        <style>
            body {
                background: linear-gradient(135deg, #f8f9fa, #e9ecef);
                min-height: 100vh;
            }
            .auth-card {
                border: none;
                border-radius: 1rem;
                box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08);
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card auth-card">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold mb-2">Forgot Password</h2>
                                <p class="text-muted mb-0">Enter your email to receive a reset link</p>
                            </div>

                            <form id="forgotForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email address</label>
                                    <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter email" required />
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-warning btn-lg">Send Reset Link</button>
                                </div>
                            </form>

                            <div id="alertBox"></div>

                            <div class="text-center mt-3">
                                <a href="/login.html" class="text-decoration-none">Back to login</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.getElementById("forgotForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const alertBox = document.getElementById("alertBox");

                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({email})
                });

                const data = await res.json();

                alertBox.innerHTML = `
              <div class="alert ${res.ok ? "alert-success" : "alert-danger"}">
                ${data.message || "Something went wrong"}
              </div>
            `;
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
