<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>My Profile</title>
        <style>
            body {
                background: #f8f9fa;
                min-height: 100vh;
            }
            .profile-card {
                border: none;
                border-radius: 1rem;
                box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08);
            }
            .topbar {
                background: #ffffff;
                box-shadow: 0 0.25rem 1rem rgba(0,0,0,0.04);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg topbar">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">Alumni Platform</a>
                <div class="ms-auto d-flex gap-2">
                    <a href="/login.html" class="btn btn-outline-secondary btn-sm" onclick="localStorage.removeItem('token')">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">
                    <div class="card profile-card">
                        <div class="card-body p-4 p-md-5">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div>
                                    <h2 class="fw-bold mb-1">My Profile</h2>
                                    <p class="text-muted mb-0">Manage your alumni information</p>
                                </div>
                                <button id="loadProfile" class="btn btn-outline-primary">Load Profile</button>
                            </div>

                            <form id="profileForm">
                                <div class="mb-3">
                                    <label for="full_name" class="form-label">Full Name</label>
                                    <input type="text" id="full_name" class="form-control form-control-lg" placeholder="Enter full name" />
                                </div>

                                <div class="mb-3">
                                    <label for="bio" class="form-label">Bio</label>
                                    <textarea id="bio" class="form-control" rows="4" placeholder="Tell us about yourself"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="profile_image" class="form-label">Profile Image</label>
                                    <input type="text" id="profile_image" class="form-control form-control-lg" placeholder="Image URL or file name" />
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Save Profile</button>
                                </div>
                            </form>

                            <div id="alertBox" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const token = localStorage.getItem("token");

            if (!token) {
                window.location.href = "/login.html";
            }

            const alertBox = document.getElementById("alertBox");

            document.getElementById("profileForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const full_name = document.getElementById("full_name").value;
                const bio = document.getElementById("bio").value;
                const profile_image = document.getElementById("profile_image").value;

                let res = await fetch("/api/profile/me", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({full_name, bio, profile_image})
                });

                if (res.status === 404) {
                    res = await fetch("/api/profile", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token
                        },
                        body: JSON.stringify({full_name, bio, profile_image})
                    });
                }

                const data = await res.json();

                alertBox.innerHTML = `
              <div class="alert ${res.ok ? "alert-success" : "alert-danger"}">
                ${data.message || "Something went wrong"}
              </div>
            `;
            });

            document.getElementById("loadProfile").addEventListener("click", async () => {
                const res = await fetch("/api/profile/me", {
                    method: "GET",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById("full_name").value = data.full_name || "";
                    document.getElementById("bio").value = data.bio || "";
                    document.getElementById("profile_image").value = data.profile_image || "";

                    alertBox.innerHTML = `
                <div class="alert alert-info">
                  Profile loaded successfully
                </div>
              `;
                } else {
                    alertBox.innerHTML = `
                <div class="alert alert-danger">
                  ${data.message || "Failed to load profile"}
                </div>
              `;
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
