<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Reset Password</title>
        <style>
            body {
                background: linear-gradient(135deg, #f8f9fa, #e9ecef);
                min-height: 100vh;
            }
            .auth-card {
                border: none;
                border-radius: 1rem;
                box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08);
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card auth-card">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold mb-2">Reset Password</h2>
                                <p class="text-muted mb-0">Enter your new password</p>
                            </div>

                            <form id="resetForm">
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">New password</label>
                                    <input type="password" id="newPassword" class="form-control form-control-lg" placeholder="Enter new password" required />
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-success btn-lg">Reset Password</button>
                                </div>
                            </form>

                            <div id="alertBox"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const token = params.get("token");

            document.getElementById("resetForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const newPassword = document.getElementById("newPassword").value;
                const alertBox = document.getElementById("alertBox");

                const res = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({token, newPassword})
                });

                const data = await res.json();

                alertBox.innerHTML = `
              <div class="alert ${res.ok ? "alert-success" : "alert-danger"}">
                ${data.message || "Something went wrong"}
              </div>
            `;

                if (res.ok) {
                    setTimeout(() => {
                        window.location.href = "/login.html";
                    }, 1200);
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
